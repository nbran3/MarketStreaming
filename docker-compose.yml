services:
  broker:
    image: apache/kafka:latest
    container_name: broker
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
  app:
    build: .
    container_name: app
    depends_on:
      - broker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 5432

  script_one:
    build: .
    container_name: script_one
    command: python marketproducer.py
    depends_on:
      - broker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 5432

  script_two:
    build: .
    container_name: script_two
    command: python marketconsumer.py
    depends_on:
      - broker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 5432
      POSTGRES_USER: noahbrannon